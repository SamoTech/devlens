<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320">
  <defs>
    <linearGradient id="bg-dl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f2027"/>
    </linearGradient>
    <linearGradient id="accent-dl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#01696f"/>
      <stop offset="100%" style="stop-color:#4f98a3"/>
    </linearGradient>
    <pattern id="grid-dl" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1c2b2e" stroke-width="1"/>
    </pattern>
    <filter id="glow-dl">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1280" height="320" fill="url(#bg-dl)"/>
  <rect width="1280" height="320" fill="url(#grid-dl)"/>
  <rect x="0" y="0" width="4" height="320" fill="url(#accent-dl)"/>
  <circle cx="1080" cy="160" r="200" fill="none" stroke="#01696f" stroke-width="1" opacity="0.12"/>
  <circle cx="1080" cy="160" r="140" fill="none" stroke="#01696f" stroke-width="1" opacity="0.18"/>
  <circle cx="1080" cy="160" r="80"  fill="none" stroke="#4f98a3" stroke-width="1.5" opacity="0.25"/>
  <circle cx="1080" cy="160" r="28"  fill="#01696f" opacity="0.15"/>
  <g transform="translate(80, 100)" filter="url(#glow-dl)">
    <ellipse cx="60" cy="60" rx="56" ry="36" fill="none" stroke="url(#accent-dl)" stroke-width="3"/>
    <circle cx="60" cy="60" r="22" fill="none" stroke="#4f98a3" stroke-width="2.5"/>
    <circle cx="60" cy="60" r="10" fill="#01696f" opacity="0.9"/>
    <circle cx="66" cy="54" r="4"  fill="#a0d4d8" opacity="0.7"/>
    <line x1="4"  y1="60" x2="34" y2="60" stroke="#4f98a3" stroke-width="1.5" opacity="0.6"/>
    <line x1="86" y1="60" x2="116" y2="60" stroke="#4f98a3" stroke-width="1.5" opacity="0.6"/>
  </g>
  <text x="220" y="148" font-family="'SF Mono',Consolas,monospace" font-size="72" font-weight="700" letter-spacing="-2" fill="#e6f4f5">Dev</text>
  <text x="370" y="148" font-family="'SF Mono',Consolas,monospace" font-size="72" font-weight="700" letter-spacing="-2" fill="url(#accent-dl)">Lens</text>
  <text x="222" y="190" font-family="'SF Mono',Consolas,monospace" font-size="20" fill="#4f98a3" letter-spacing="3" opacity="0.9">REPO HEALTH · SECURITY · INTELLIGENCE</text>
  <rect x="220" y="208" width="520" height="2" fill="url(#accent-dl)" opacity="0.5"/>
  <rect x="222" y="230" width="110" height="28" rx="14" fill="#01696f" opacity="0.2"/>
  <text x="277" y="249" font-family="monospace" font-size="13" fill="#4f98a3" text-anchor="middle">9 Dimensions</text>
  <rect x="344" y="230" width="130" height="28" rx="14" fill="#01696f" opacity="0.2"/>
  <text x="409" y="249" font-family="monospace" font-size="13" fill="#4f98a3" text-anchor="middle">13 Scan Modules</text>
  <rect x="486" y="230" width="100" height="28" rx="14" fill="#01696f" opacity="0.2"/>
